[jnic-zig]
# 水印内容，用于追踪泄露
watermark = "JNIC-zig"

# 使用 FFM API (Java 22+) 代替 JNI native
use_ffm = false

# 开启反调试保护
anti_debug = true

# 开启符号随机化（DLL中的函数名、变量名、参数名）
renamer = true

# 混淆完成后删除字节码中的 @Native 注解
remove_native_annotation = true

# 启用 -ffast-math 浮点优化（允许 FP 重排以启用 SIMD 向量化，有微小精度差异）
fast_math = true

# 输入JAR
input_jar = "./input.jar"

# 输出JAR
output_jar = "./out.jar"
